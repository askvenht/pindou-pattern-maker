    // ========== Color Science ==========
    function srgbToLinear(value) {
      const channel = value / 255;
      return channel <= 0.04045 ? channel / 12.92 : Math.pow((channel + 0.055) / 1.055, 2.4);
    }

    function rgbToLab(rgb) {
      const r = srgbToLinear(rgb[0]);
      const g = srgbToLinear(rgb[1]);
      const b = srgbToLinear(rgb[2]);
      let x = r * 0.4124564 + g * 0.3575761 + b * 0.1804375;
      let y = r * 0.2126729 + g * 0.7151522 + b * 0.0721750;
      let z = r * 0.0193339 + g * 0.1191920 + b * 0.9503041;
      x /= 0.95047;
      z /= 1.08883;
      const fx = x > 0.008856 ? Math.cbrt(x) : 7.787 * x + 16 / 116;
      const fy = y > 0.008856 ? Math.cbrt(y) : 7.787 * y + 16 / 116;
      const fz = z > 0.008856 ? Math.cbrt(z) : 7.787 * z + 16 / 116;
      return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
    }

    function ensurePaletteLab(palette) {
      for (const color of palette) {
        if (!color[3]) color[3] = rgbToLab(color[2]);
      }
      return palette;
    }

    function colorDistanceLab(labA, labB) {
      const dl = labA[0] - labB[0];
      const da = labA[1] - labB[1];
      const db = labA[2] - labB[2];
      const chromaA = Math.sqrt(labA[1] * labA[1] + labA[2] * labA[2]);
      const chromaB = Math.sqrt(labB[1] * labB[1] + labB[2] * labB[2]);
      const lWeight = colorSafeInput.checked ? 3.8 : 2.0;
      const darkPenalty = colorSafeInput.checked && labB[0] < labA[0] - 8 ? Math.pow(labA[0] - labB[0] - 8, 2) * 2.2 : 0;
      const neutralPenalty = colorSafeInput.checked && chromaA < 10 && chromaB > 14 ? Math.pow(chromaB - 10, 2) * 1.8 : 0;
      const chromaPenalty = colorSafeInput.checked ? Math.pow(chromaA - chromaB, 2) * 0.35 : 0;
      return dl * dl * lWeight + da * da + db * db + darkPenalty + neutralPenalty + chromaPenalty;
    }

    let nearestCache = new Map();
    let nearestCacheKey = "";

    function nearestColor(rgb, palette) {
      const stateKey = paletteInput.value + (colorSafeInput.checked ? "1" : "0");
      if (stateKey !== nearestCacheKey) { nearestCache = new Map(); nearestCacheKey = stateKey; }
      const key = ((rgb[0] | 0) << 16) | ((rgb[1] | 0) << 8) | (rgb[2] | 0);
      const cached = nearestCache.get(key);
      if (cached) return cached;
      let best = palette[0];
      let bestScore = Infinity;
      const lab = rgbToLab(rgb);
      for (const color of palette) {
        const score = colorDistanceLab(lab, color[3] || rgbToLab(color[2]));
        if (score < bestScore) {
          best = color;
          bestScore = score;
        }
      }
      nearestCache.set(key, best);
      return best;
    }

    function quantizeKMeans(pixels, width, height, k) {
      const n = width * height;
      const labs = new Float32Array(n * 3);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const lab = rgbToLab(pixels[y][x]);
          const i = (y * width + x) * 3;
          labs[i] = lab[0]; labs[i+1] = lab[1]; labs[i+2] = lab[2];
        }
      }
      const centers = new Float32Array(k * 3);
      const step = Math.max(1, Math.floor(n / k));
      for (let c = 0; c < k; c++) {
        const src = Math.min(n - 1, c * step) * 3;
        centers[c*3] = labs[src]; centers[c*3+1] = labs[src+1]; centers[c*3+2] = labs[src+2];
      }
      const assign = new Uint16Array(n);
      const sums = new Float64Array(k * 3);
      const cnts = new Uint32Array(k);
      const sampleStride = Math.max(1, Math.floor(n / 6000));
      for (let iter = 0; iter < 8; iter++) {
        sums.fill(0); cnts.fill(0);
        for (let i = 0; i < n; i += sampleStride) {
          const l = labs[i*3], a = labs[i*3+1], b = labs[i*3+2];
          let bi = 0, bd = Infinity;
          for (let c = 0; c < k; c++) {
            const dl = l - centers[c*3], da = a - centers[c*3+1], db = b - centers[c*3+2];
            const d = dl*dl*2 + da*da + db*db;
            if (d < bd) { bd = d; bi = c; }
          }
          sums[bi*3] += l; sums[bi*3+1] += a; sums[bi*3+2] += b; cnts[bi]++;
        }
        for (let c = 0; c < k; c++) {
          if (cnts[c]) {
            centers[c*3] = sums[c*3] / cnts[c];
            centers[c*3+1] = sums[c*3+1] / cnts[c];
            centers[c*3+2] = sums[c*3+2] / cnts[c];
          }
        }
      }
      for (let i = 0; i < n; i++) {
        const l = labs[i*3], a = labs[i*3+1], b = labs[i*3+2];
        let bi = 0, bd = Infinity;
        for (let c = 0; c < k; c++) {
          const dl = l - centers[c*3], da = a - centers[c*3+1], db = b - centers[c*3+2];
          const d = dl*dl*2 + da*da + db*db;
          if (d < bd) { bd = d; bi = c; }
        }
        assign[i] = bi;
      }
      const rgbSums = new Float64Array(k * 3);
      const rgbCnts = new Uint32Array(k);
      for (let i = 0; i < n; i++) {
        const y = (i / width) | 0, x = i % width;
        const c = assign[i];
        rgbSums[c*3] += pixels[y][x][0]; rgbSums[c*3+1] += pixels[y][x][1]; rgbSums[c*3+2] += pixels[y][x][2];
        rgbCnts[c]++;
      }
      const clusterRgb = [];
      for (let c = 0; c < k; c++) {
        clusterRgb.push(rgbCnts[c] ? [rgbSums[c*3]/rgbCnts[c], rgbSums[c*3+1]/rgbCnts[c], rgbSums[c*3+2]/rgbCnts[c]] : null);
      }
      return { assign, clusterRgb };
    }

    function getCropRect(targetRatio) {
      const sourceWidth = sourceImage.naturalWidth || sourceImage.width;
      const sourceHeight = sourceImage.naturalHeight || sourceImage.height;
      const imageRatio = sourceWidth / sourceHeight;
      let baseWidth = sourceWidth;
      let baseHeight = sourceHeight;
      if (imageRatio > targetRatio) {
        baseWidth = sourceHeight * targetRatio;
      } else {
        baseHeight = sourceWidth / targetRatio;
      }
      const zoom = parseFloat(cropZoomInput.value || "1");
      const width = Math.min(sourceWidth, baseWidth / zoom);
      const height = Math.min(sourceHeight, baseHeight / zoom);
      const focusX = parseFloat(focusXInput.value || "50") / 100;
      const focusY = parseFloat(focusYInput.value || "50") / 100;
      return { x: (sourceWidth - width) * focusX, y: (sourceHeight - height) * focusY, width, height };
    }

    function addError(data, width, x, y, err, factor) {
      if (x < 0 || y < 0 || x >= width || y >= data.length / width) return;
      const pixel = data[y][x];
      pixel[0] = clamp(pixel[0] + err[0] * factor, 0, 255);
      pixel[1] = clamp(pixel[1] + err[1] * factor, 0, 255);
      pixel[2] = clamp(pixel[2] + err[2] * factor, 0, 255);
    }

    function applySharpen(imageData, width, height, amount) {
      if (amount <= 0) return imageData;
      const source = new Uint8ClampedArray(imageData.data);
      const target = imageData.data;
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const index = (y * width + x) * 4;
          for (let channel = 0; channel < 3; channel++) {
            const center = source[index + channel];
            const top = source[index - width * 4 + channel];
            const right = source[index + 4 + channel];
            const bottom = source[index + width * 4 + channel];
            const left = source[index - 4 + channel];
            target[index + channel] = clamp(center * (1 + 4 * amount) - (top + right + bottom + left) * amount, 0, 255);
          }
        }
      }
      return imageData;
    }

    function getArtisanSettings() {
      const strength = artisanStrengthInput.value;
      if (colorSafeInput.checked) {
        if (strength === "soft") return { posterize: 0, smoothPasses: 0, edge: 0, cleanupPasses: 1, minBeads: 2 };
        if (strength === "strong") return { posterize: 0, smoothPasses: 0, edge: 0, cleanupPasses: 2, minBeads: 8 };
        return { posterize: 0, smoothPasses: 0, edge: 0, cleanupPasses: 1, minBeads: 4 };
      }
      if (strength === "soft") return { posterize: 40, smoothPasses: 1, edge: 0.08, cleanupPasses: 1, minBeads: 8 };
      if (strength === "strong") return { posterize: 24, smoothPasses: 2, edge: 0.18, cleanupPasses: 3, minBeads: 24 };
      return { posterize: 32, smoothPasses: 1, edge: 0.12, cleanupPasses: 2, minBeads: 14 };
    }

    function applyBoxSmooth(imageData, width, height, passes) {
      for (let pass = 0; pass < passes; pass++) {
        const source = new Uint8ClampedArray(imageData.data);
        const target = imageData.data;
        for (let y = 1; y < height - 1; y++) {
          for (let x = 1; x < width - 1; x++) {
            const index = (y * width + x) * 4;
            for (let channel = 0; channel < 3; channel++) {
              let sum = source[index + channel] * 4;
              sum += source[index - width * 4 + channel] * 2;
              sum += source[index + width * 4 + channel] * 2;
              sum += source[index - 4 + channel] * 2;
              sum += source[index + 4 + channel] * 2;
              sum += source[index - width * 4 - 4 + channel];
              sum += source[index - width * 4 + 4 + channel];
              sum += source[index + width * 4 - 4 + channel];
              sum += source[index + width * 4 + 4 + channel];
              target[index + channel] = Math.round(sum / 16);
            }
          }
        }
      }
      return imageData;
    }

    function applyPosterize(imageData, levels) {
      const step = 255 / Math.max(2, levels - 1);
      for (let i = 0; i < imageData.data.length; i += 4) {
        imageData.data[i] = Math.round(imageData.data[i] / step) * step;
        imageData.data[i + 1] = Math.round(imageData.data[i + 1] / step) * step;
        imageData.data[i + 2] = Math.round(imageData.data[i + 2] / step) * step;
      }
      return imageData;
    }

    function applyEdgeBoost(imageData, width, height, amount) {
      if (amount <= 0) return imageData;
      const source = new Uint8ClampedArray(imageData.data);
      const target = imageData.data;
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const index = (y * width + x) * 4;
          const left = index - 4;
          const right = index + 4;
          const top = index - width * 4;
          const bottom = index + width * 4;
          const edge =
            Math.abs(source[right] - source[left]) +
            Math.abs(source[right + 1] - source[left + 1]) +
            Math.abs(source[right + 2] - source[left + 2]) +
            Math.abs(source[bottom] - source[top]) +
            Math.abs(source[bottom + 1] - source[top + 1]) +
            Math.abs(source[bottom + 2] - source[top + 2]);
          if (edge > 90) {
            const darken = clamp(1 - amount * Math.min(edge / 420, 1), 0.62, 1);
            target[index] = clamp(source[index] * darken, 0, 255);
            target[index + 1] = clamp(source[index + 1] * darken, 0, 255);
            target[index + 2] = clamp(source[index + 2] * darken, 0, 255);
          }
        }
      }
      return imageData;
    }

    function applyVibranceBoost(imageData, amount) {
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
        const sat = mx === 0 ? 0 : (mx - mn) / mx;
        const boost = 1 + amount * (1 - sat);
        const avg = (r + g + b) / 3;
        d[i]   = clamp(Math.round(avg + (r - avg) * boost), 0, 255);
        d[i+1] = clamp(Math.round(avg + (g - avg) * boost), 0, 255);
        d[i+2] = clamp(Math.round(avg + (b - avg) * boost), 0, 255);
      }
    }

    function applyContrastBoost(imageData, amount) {
      const d = imageData.data;
      const f = (259 * (amount + 255)) / (255 * (259 - amount));
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = clamp(Math.round(f * (d[i] - 128) + 128), 0, 255);
        d[i+1] = clamp(Math.round(f * (d[i+1] - 128) + 128), 0, 255);
        d[i+2] = clamp(Math.round(f * (d[i+2] - 128) + 128), 0, 255);
      }
    }

    function applyArtisanPreprocess(imageData, width, height) {
      if (!artisanModeInput.checked) return imageData;
      const settings = getArtisanSettings();
      if (settings.smoothPasses > 0) applyBoxSmooth(imageData, width, height, settings.smoothPasses);
      if (settings.posterize > 0) applyPosterize(imageData, settings.posterize);
      if (settings.edge > 0) applyEdgeBoost(imageData, width, height, settings.edge);
      return imageData;
    }

    function rebuildCounts() {
      counts = new Map();
      for (const row of pattern) {
        for (const color of row) counts.set(color[0], (counts.get(color[0]) || 0) + 1);
      }
    }

    function limitPatternColors(maxColors, palette) {
      if (!Number.isFinite(maxColors) || maxColors >= palette.length || counts.size <= maxColors) return;
      const keepCodes = new Set([...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, maxColors).map(([code]) => code));
      const keepPalette = palette.filter((color) => keepCodes.has(color[0]));
      for (let y = 0; y < pattern.length; y++) {
        for (let x = 0; x < pattern[y].length; x++) {
          if (!keepCodes.has(pattern[y][x][0])) {
            pattern[y][x] = nearestColor(pattern[y][x][2], keepPalette);
          }
        }
      }
      rebuildCounts();
    }

    function mergeLowUsageColors(minBeads, palette) {
      if (!Number.isFinite(minBeads) || minBeads <= 0) return;
      rebuildCounts();
      const keepCodes = new Set([...counts.entries()].filter(([, count]) => count >= minBeads).map(([code]) => code));
      if (!keepCodes.size || keepCodes.size === counts.size) return;
      const keepPalette = palette.filter((color) => keepCodes.has(color[0]));
      if (!keepPalette.length) return;
      for (let y = 0; y < pattern.length; y++) {
        for (let x = 0; x < pattern[y].length; x++) {
          if (!keepCodes.has(pattern[y][x][0])) {
            const sourceLab = rgbToLab(pattern[y][x][2]);
            const safePalette = colorSafeInput.checked
              ? keepPalette.filter((color) => Math.abs((color[3] || rgbToLab(color[2]))[0] - sourceLab[0]) <= 14)
              : keepPalette;
            pattern[y][x] = nearestColor(pattern[y][x][2], safePalette.length ? safePalette : keepPalette);
          }
        }
      }
      rebuildCounts();
    }

    function cleanupPattern(passCount = 1) {
      if (!cleanupInput.checked || pattern.length < 3 || pattern[0].length < 3) return;
      const height = pattern.length;
      const width = pattern[0].length;
      for (let pass = 0; pass < passCount; pass++) {
        const next = pattern.map((row) => row.slice());
        for (let y = 1; y < height - 1; y++) {
          for (let x = 1; x < width - 1; x++) {
            const current = pattern[y][x][0];
            const neighbors = [
              pattern[y - 1][x], pattern[y + 1][x],
              pattern[y][x - 1], pattern[y][x + 1],
              pattern[y - 1][x - 1], pattern[y - 1][x + 1],
              pattern[y + 1][x - 1], pattern[y + 1][x + 1]
            ];
            const neighborCounts = new Map();
            for (const color of neighbors) neighborCounts.set(color[0], (neighborCounts.get(color[0]) || 0) + 1);
            const [bestCode, bestCount] = [...neighborCounts.entries()].sort((a, b) => b[1] - a[1])[0];
            if (bestCode !== current && bestCount >= 5) {
              next[y][x] = neighbors.find((color) => color[0] === bestCode);
            }
          }
        }
        pattern = next;
      }
      rebuildCounts();
    }

    function showProgress(pct) {
      progressBar.classList.add("active");
      progressFill.style.width = pct + "%";
    }

    function hideProgress() {
      progressBar.classList.remove("active");
      progressFill.style.width = "0%";
    }

    let hasGeneratedOnce = false;
    let isBuilding = false;
    let pendingBuild = false;

    function buildPattern(isAutoRebuild) {
      if (!sourceImage) return;
      if (isBuilding) { pendingBuild = true; return; }
      if (!hasGeneratedOnce) {
        if (!spendCredits(1)) {
          showToast("积分不足，请先兑换 CDK");
          $("cdkModal").classList.add("open");
          $("cdkInput").focus();
          return;
        }
        hasGeneratedOnce = true;
      }
      isBuilding = true;

      const t0 = performance.now();
      showProgress(10);
      statusText.textContent = "正在生成…";
      empty.hidden = true;

      setTimeout(() => {
        try {
        const beadWidth = clamp(parseInt(widthInput.value || "160", 10), 8, 600);
        const beadHeight = clamp(parseInt(heightInput.value || "160", 10), 8, 600);
        const palette = palettes[paletteInput.value];
        ensurePaletteLab(palette);
        const off = document.createElement("canvas");
        off.width = beadWidth;
        off.height = beadHeight;
        const offCtx = off.getContext("2d", { willReadFrequently: true });
        offCtx.imageSmoothingEnabled = !crispInput.checked;
        offCtx.imageSmoothingQuality = crispInput.checked ? "low" : "high";
        offCtx.fillStyle = "#fff";
        offCtx.fillRect(0, 0, beadWidth, beadHeight);
        if (mirrorInput.checked) {
          offCtx.translate(beadWidth, 0);
          offCtx.scale(-1, 1);
        }
        const crop = getCropRect(beadWidth / beadHeight);
        offCtx.drawImage(sourceImage, crop.x, crop.y, crop.width, crop.height, 0, 0, beadWidth, beadHeight);

        showProgress(30);

        const imageData = applySharpen(
          offCtx.getImageData(0, 0, beadWidth, beadHeight),
          beadWidth, beadHeight,
          parseFloat(sharpenInput.value || "0") * 0.28
        );
        const vib = parseFloat(vibranceInput.value || "0");
        if (vib > 0) applyVibranceBoost(imageData, vib);
        const con = parseInt(contrastInput.value || "0", 10);
        if (con > 0) applyContrastBoost(imageData, con);
        applyArtisanPreprocess(imageData, beadWidth, beadHeight);
        const pixels = [];
        for (let y = 0; y < beadHeight; y++) {
          const row = [];
          for (let x = 0; x < beadWidth; x++) {
            const index = (y * beadWidth + x) * 4;
            const alpha = imageData.data[index + 3] / 255;
            row.push([
              imageData.data[index] * alpha + 255 * (1 - alpha),
              imageData.data[index + 1] * alpha + 255 * (1 - alpha),
              imageData.data[index + 2] * alpha + 255 * (1 - alpha)
            ]);
          }
          pixels.push(row);
        }

        showProgress(55);

        pattern = [];
        counts = new Map();
        if (artisanModeInput.checked && !ditherInput.checked) {
          const k = Math.min(64, parseInt(maxColorsInput.value, 10) || 64);
          const { assign, clusterRgb } = quantizeKMeans(pixels, beadWidth, beadHeight, k);
          const clusterColors = clusterRgb.map((rgb) => rgb ? nearestColor(rgb, palette) : palette[0]);
          for (let y = 0; y < beadHeight; y++) {
            const row = [];
            for (let x = 0; x < beadWidth; x++) {
              const color = clusterColors[assign[y * beadWidth + x]];
              row.push(color);
              counts.set(color[0], (counts.get(color[0]) || 0) + 1);
            }
            pattern.push(row);
          }
        } else {
          for (let y = 0; y < beadHeight; y++) {
            const row = [];
            for (let x = 0; x < beadWidth; x++) {
              const old = pixels[y][x];
              const color = nearestColor(old, palette);
              row.push(color);
              counts.set(color[0], (counts.get(color[0]) || 0) + 1);
              if (ditherInput.checked) {
                const next = color[2];
                const err = [old[0] - next[0], old[1] - next[1], old[2] - next[2]];
                addError(pixels, beadWidth, x + 1, y, err, 7 / 16);
                addError(pixels, beadWidth, x - 1, y + 1, err, 3 / 16);
                addError(pixels, beadWidth, x, y + 1, err, 5 / 16);
                addError(pixels, beadWidth, x + 1, y + 1, err, 1 / 16);
              }
            }
            pattern.push(row);
          }
        }

        showProgress(75);

        limitPatternColors(parseInt(maxColorsInput.value, 10), palette);
        if (artisanModeInput.checked) {
          const settings = getArtisanSettings();
          mergeLowUsageColors(settings.minBeads, palette);
          cleanupPattern(settings.cleanupPasses);
        } else {
          cleanupPattern();
        }

        showProgress(90);

        renderPattern();
        renderSummary();
        pngButton.disabled = false;
        pixelArtButton.disabled = false;
        svgButton.disabled = false;
        pagedSvgButton.disabled = false;
        pagedPngButton.disabled = false;
        materialsButton.disabled = false;
        zoomControls.style.display = "flex";
        floatFit.hidden = false;
        pixelPreviewToggle.style.display = "";
        legendSearchWrap.style.display = "block";
        $("mExport").disabled = false;
        $("mLegend").disabled = false;

        requestAnimationFrame(() => zoomToFit());

        const elapsed = Math.round(performance.now() - t0);
        statusText.textContent = `图纸已生成 (${elapsed}ms)`;
        showProgress(100);
        setTimeout(hideProgress, 400);
        } catch (err) {
          statusText.textContent = "生成出错：" + err.message;
          hideProgress();
        } finally {
          isBuilding = false;
          if (pendingBuild) { pendingBuild = false; setTimeout(() => buildPattern(true), 30); }
        }
      }, 30);
    }

    function renderPattern() {
      if (!pattern.length) return;
      const beadHeight = pattern.length;
      const beadWidth = pattern[0].length;

      if (pixelArtMode) {
        // pixel art view: no grid, no labels, pure color squares
        const scale = Math.max(2, Math.min(12, Math.floor(800 / Math.max(beadWidth, beadHeight))));
        canvas.width = beadWidth * scale;
        canvas.height = beadHeight * scale;
        for (let y = 0; y < beadHeight; y++) {
          for (let x = 0; x < beadWidth; x++) {
            const color = pattern[y][x];
            ctx.fillStyle = `rgb(${color[2].join(",")})`;
            ctx.fillRect(x * scale, y * scale, scale, scale);
          }
        }
        return;
      }

      const cell = parseInt(cellInput.value, 10);
      const labelSpace = 28;
      canvas.width = beadWidth * cell + labelSpace;
      canvas.height = beadHeight * cell + labelSpace;

      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `${Math.max(8, Math.floor(cell * .42))}px system-ui, sans-serif`;

      for (let y = 0; y < beadHeight; y++) {
        for (let x = 0; x < beadWidth; x++) {
          const color = pattern[y][x];
          const px = labelSpace + x * cell;
          const py = labelSpace + y * cell;
          ctx.fillStyle = `rgb(${color[2].join(",")})`;
          ctx.fillRect(px, py, cell, cell);
          if (symbolsInput.checked && cell >= 14) {
            const luminance = color[2][0] * .299 + color[2][1] * .587 + color[2][2] * .114;
            ctx.fillStyle = luminance > 150 ? "#17202b" : "#fff";
            ctx.fillText(color[0], px + cell / 2, py + cell / 2);
          }
        }
      }

      if (gridInput.checked) {
        ctx.strokeStyle = "rgba(20,30,40,.28)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= beadWidth; x++) {
          const px = labelSpace + x * cell + .5;
          ctx.beginPath(); ctx.moveTo(px, labelSpace); ctx.lineTo(px, labelSpace + beadHeight * cell); ctx.stroke();
        }
        for (let y = 0; y <= beadHeight; y++) {
          const py = labelSpace + y * cell + .5;
          ctx.beginPath(); ctx.moveTo(labelSpace, py); ctx.lineTo(labelSpace + beadWidth * cell, py); ctx.stroke();
        }
        ctx.strokeStyle = "rgba(20,30,40,.62)";
        for (let x = 0; x <= beadWidth; x += 10) {
          const px = labelSpace + x * cell + .5;
          ctx.beginPath(); ctx.moveTo(px, labelSpace); ctx.lineTo(px, labelSpace + beadHeight * cell); ctx.stroke();
        }
        for (let y = 0; y <= beadHeight; y += 10) {
          const py = labelSpace + y * cell + .5;
          ctx.beginPath(); ctx.moveTo(labelSpace, py); ctx.lineTo(labelSpace + beadWidth * cell, py); ctx.stroke();
        }
      }

      ctx.fillStyle = "#607083";
      ctx.font = "11px system-ui, sans-serif";
      for (let x = 0; x < beadWidth; x += 5) ctx.fillText(String(x + 1), labelSpace + x * cell + cell / 2, 13);
      for (let y = 0; y < beadHeight; y += 5) ctx.fillText(String(y + 1), 13, labelSpace + y * cell + cell / 2);

      empty.hidden = true;
      canvasInner.hidden = false;
      applyZoom();
      sizeText.textContent = `${beadWidth} x ${beadHeight}`;
    }

    function applyZoom() {
      canvas.style.width = (canvas.width * canvasZoom) + "px";
      canvas.style.height = (canvas.height * canvasZoom) + "px";
      zoomLevelText.textContent = Math.round(canvasZoom * 100) + "%";
    }

    function zoomToFit() {
      if (!pattern.length) return;
      const boxWidth = canvasBox.clientWidth - 28;
      const boxHeight = canvasBox.clientHeight - 28;
      canvasZoom = Math.min(1, boxWidth / canvas.width, boxHeight / canvas.height);
      canvasZoom = Math.round(canvasZoom * 100) / 100;
      applyZoom();
    }

    $("zoomIn").addEventListener("click", () => { canvasZoom = Math.min(3, canvasZoom + 0.25); applyZoom(); });
    $("zoomOut").addEventListener("click", () => { canvasZoom = Math.max(0.1, canvasZoom - 0.25); applyZoom(); });
    $("zoomFit").addEventListener("click", zoomToFit);
    floatFit.addEventListener("click", zoomToFit);

    canvasBox.addEventListener("wheel", (e) => {
      if (!pattern.length) return;
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        canvasZoom = clamp(canvasZoom + delta, 0.1, 3);
        canvasZoom = Math.round(canvasZoom * 100) / 100;
        applyZoom();
      }
    }, { passive: false });

    let touchStartDist = 0;
    let touchStartZoom = 1;
    canvasBox.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchStartDist = Math.hypot(dx, dy);
        touchStartZoom = canvasZoom;
      }
    }, { passive: false });
    canvasBox.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && pattern.length) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const scale = dist / touchStartDist;
        canvasZoom = clamp(touchStartZoom * scale, 0.1, 3);
        canvasZoom = Math.round(canvasZoom * 100) / 100;
        applyZoom();
      }
    }, { passive: false });

    const beadTip = $("beadTip");
    const labelSpace = 30;

    function getBeadAt(clientX, clientY) {
      if (!pattern.length) return null;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = (clientX - rect.left) * scaleX;
      const cy = (clientY - rect.top) * scaleY;
      const cell = parseInt(cellInput.value, 10);
      const bx = Math.floor((cx - labelSpace) / cell);
      const by = Math.floor((cy - labelSpace) / cell);
      if (bx < 0 || by < 0 || by >= pattern.length || bx >= pattern[0].length) return null;
      return { x: bx, y: by, color: pattern[by][bx] };
    }

    function showBeadTip(clientX, clientY) {
      const bead = getBeadAt(clientX, clientY);
      if (!bead) { beadTip.hidden = true; return; }
      const boxRect = canvasBox.getBoundingClientRect();
      const tipX = clientX - boxRect.left + canvasBox.scrollLeft;
      const tipY = clientY - boxRect.top + canvasBox.scrollTop;
      beadTip.innerHTML = `<span class="tip-swatch" style="background:rgb(${bead.color[2].join(",")})"></span>${bead.color[0]} · ${bead.color[1]}<span style="opacity:.5;font-weight:400;margin-left:2px">(${bead.x+1},${bead.y+1})</span>`;
      beadTip.style.left = tipX + "px";
      beadTip.style.top = tipY + "px";
      beadTip.hidden = false;
    }

    canvas.addEventListener("mousemove", (e) => showBeadTip(e.clientX, e.clientY));
    canvas.addEventListener("mouseleave", () => { beadTip.hidden = true; });
    canvas.addEventListener("click", (e) => {
      if (!("ontouchstart" in window)) return;
      showBeadTip(e.clientX, e.clientY);
    });

    function renderSummary() {
      if (!pattern.length) return;
      const beadHeight = pattern.length;
      const beadWidth = pattern[0].length;
      const palette = palettes[paletteInput.value];
      const used = palette.filter((color) => counts.has(color[0])).sort((a, b) => counts.get(b[0]) - counts.get(a[0]));

      finalSize.textContent = `${Math.round(beadWidth * 0.5)} x ${Math.round(beadHeight * 0.5)} cm`;
      totalBeads.textContent = `${(beadWidth * beadHeight).toLocaleString()}`;
      colorCount.textContent = `${used.length}`;
      legend.innerHTML = "";

      for (const color of used) {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.dataset.code = color[0].toLowerCase();
        item.innerHTML = `
          <span class="swatch" style="background: rgb(${color[2].join(",")})"></span>
          <strong>${color[0]}</strong>
          <span>${color[1]}</span>
          <b>${counts.get(color[0]).toLocaleString()}</b>
        `;
        legend.appendChild(item);
      }
      legendSearch.value = "";
    }

    legendSearch.addEventListener("input", () => {
      const q = legendSearch.value.trim().toLowerCase();
      legend.querySelectorAll(".legend-item").forEach((item) => {
        item.classList.toggle("filtered", q && !item.dataset.code.includes(q));
      });
    });

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    // On iOS/iPadOS: uses native share sheet so user can "存储图像" to Photos.
    // On desktop/Android: falls back to regular <a download>.
    async function saveImagePng(dataUrl, filename) {
      if (navigator.share && navigator.canShare) {
        try {
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const file = new File([blob], filename, { type: "image/png" });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: filename });
            return;
          }
        } catch (e) {
          if (e.name === "AbortError") return; // user cancelled share sheet
        }
      }
      const a = document.createElement("a");
      a.href = dataUrl; a.download = filename; a.click();
    }

    function xmlEscape(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;" })[char]);
    }

    function rgbText(color) { return `rgb(${color.join(",")})`; }

    function drawPageCanvas(pageX, pageY) {
      const beadHeight = pattern.length;
      const beadWidth = pattern[0].length;
      const pageBeads = parseInt(pageBeadsInput.value, 10);
      const cols = Math.ceil(beadWidth / pageBeads);
      const rows = Math.ceil(beadHeight / pageBeads);
      const pageNumber = pageY * cols + pageX + 1;
      const cell = 32;
      const labelSpace = 48;
      const footer = 70;
      const startX = pageX * pageBeads;
      const startY = pageY * pageBeads;
      const endX = Math.min(startX + pageBeads, beadWidth);
      const endY = Math.min(startY + pageBeads, beadHeight);
      const actualWidth = endX - startX;
      const actualHeight = endY - startY;
      const pageCanvas = document.createElement("canvas");
      pageCanvas.width = actualWidth * cell + labelSpace;
      pageCanvas.height = actualHeight * cell + labelSpace + footer;
      const pageCtx = pageCanvas.getContext("2d");

      pageCtx.fillStyle = "#fff";
      pageCtx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
      pageCtx.textAlign = "center";
      pageCtx.textBaseline = "middle";
      pageCtx.font = `bold ${Math.max(12, Math.floor(cell * .42))}px Arial, sans-serif`;

      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const color = pattern[y][x];
          const px = labelSpace + (x - startX) * cell;
          const py = labelSpace + (y - startY) * cell;
          pageCtx.fillStyle = rgbText(color[2]);
          pageCtx.fillRect(px, py, cell, cell);
          if (symbolsInput.checked) {
            const luminance = color[2][0] * .299 + color[2][1] * .587 + color[2][2] * .114;
            pageCtx.fillStyle = luminance > 150 ? "#17202b" : "#fff";
            pageCtx.fillText(color[0], px + cell / 2, py + cell / 2);
          }
        }
      }

      if (gridInput.checked) {
        for (let x = 0; x <= actualWidth; x++) {
          const px = labelSpace + x * cell + .5;
          pageCtx.strokeStyle = (startX + x) % 10 === 0 ? "rgba(20,30,40,.72)" : "rgba(20,30,40,.32)";
          pageCtx.lineWidth = (startX + x) % 10 === 0 ? 1.5 : 1;
          pageCtx.beginPath(); pageCtx.moveTo(px, labelSpace); pageCtx.lineTo(px, labelSpace + actualHeight * cell); pageCtx.stroke();
        }
        for (let y = 0; y <= actualHeight; y++) {
          const py = labelSpace + y * cell + .5;
          pageCtx.strokeStyle = (startY + y) % 10 === 0 ? "rgba(20,30,40,.72)" : "rgba(20,30,40,.32)";
          pageCtx.lineWidth = (startY + y) % 10 === 0 ? 1.5 : 1;
          pageCtx.beginPath(); pageCtx.moveTo(labelSpace, py); pageCtx.lineTo(labelSpace + actualWidth * cell, py); pageCtx.stroke();
        }
      }

      pageCtx.fillStyle = "#607083";
      pageCtx.font = "12px Arial, sans-serif";
      for (let x = startX; x < endX; x += 5) pageCtx.fillText(String(x + 1), labelSpace + (x - startX) * cell + cell / 2, 20);
      for (let y = startY; y < endY; y += 5) pageCtx.fillText(String(y + 1), 20, labelSpace + (y - startY) * cell + cell / 2);

      pageCtx.textAlign = "left";
      pageCtx.textBaseline = "alphabetic";
      pageCtx.fillStyle = "#1c2430";
      pageCtx.font = "bold 20px Arial, sans-serif";
      pageCtx.fillText(`第 ${pageNumber} / ${cols * rows} 页`, 16, pageCanvas.height - 38);
      pageCtx.fillStyle = "#607083";
      pageCtx.font = "14px Arial, sans-serif";
      pageCtx.fillText(`列 ${startX + 1}-${endX}，行 ${startY + 1}-${endY}`, 16, pageCanvas.height - 16);
      return pageCanvas;
    }

    function canvasToBlob(c) { return new Promise((r) => c.toBlob(r, "image/png")); }

    function makeCrcTable() {
      const t = [];
      for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
      return t;
    }
    const crcTable = makeCrcTable();
    function crc32(bytes) { let c = 0xffffffff; for (const b of bytes) c = crcTable[(c ^ b) & 0xff] ^ (c >>> 8); return (c ^ 0xffffffff) >>> 0; }

    function dosTimeDate(d) {
      return { time: (d.getHours() << 11) | (d.getMinutes() << 5) | Math.floor(d.getSeconds() / 2), day: ((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate() };
    }
    function writeUint16(b, v) { b.push(v & 255, (v >>> 8) & 255); }
    function writeUint32(b, v) { b.push(v & 255, (v >>> 8) & 255, (v >>> 16) & 255, (v >>> 24) & 255); }

    function buildZip(files) {
      const enc = new TextEncoder();
      const now = dosTimeDate(new Date());
      const local = [], central = [];
      let offset = 0;
      for (const f of files) {
        const nb = enc.encode(f.name), d = f.data, cr = crc32(d), h = [];
        writeUint32(h, 0x04034b50); writeUint16(h, 20); writeUint16(h, 0); writeUint16(h, 0);
        writeUint16(h, now.time); writeUint16(h, now.day); writeUint32(h, cr);
        writeUint32(h, d.length); writeUint32(h, d.length); writeUint16(h, nb.length); writeUint16(h, 0);
        local.push(new Uint8Array(h), nb, d);
        const ch = [];
        writeUint32(ch, 0x02014b50); writeUint16(ch, 20); writeUint16(ch, 20); writeUint16(ch, 0); writeUint16(ch, 0);
        writeUint16(ch, now.time); writeUint16(ch, now.day); writeUint32(ch, cr);
        writeUint32(ch, d.length); writeUint32(ch, d.length); writeUint16(ch, nb.length);
        writeUint16(ch, 0); writeUint16(ch, 0); writeUint16(ch, 0); writeUint16(ch, 0);
        writeUint32(ch, 0); writeUint32(ch, offset);
        central.push(new Uint8Array(ch), nb);
        offset += h.length + nb.length + d.length;
      }
      const cs = central.reduce((s, p) => s + p.length, 0), e = [];
      writeUint32(e, 0x06054b50); writeUint16(e, 0); writeUint16(e, 0);
      writeUint16(e, files.length); writeUint16(e, files.length);
      writeUint32(e, cs); writeUint32(e, offset); writeUint16(e, 0);
      return new Blob([...local, ...central, new Uint8Array(e)], { type: "application/zip" });
    }

    function buildSpliceGuide(cols, rows, pageBeads, totalW, totalH) {
      const cellW = 100, cellH = 80, pad = 40, headerH = 60;
      const w = cols * cellW + pad * 2;
      const h = rows * cellH + pad * 2 + headerH;
      const gc = document.createElement("canvas");
      gc.width = w; gc.height = h;
      const gx = gc.getContext("2d");
      gx.fillStyle = "#fff"; gx.fillRect(0, 0, w, h);

      gx.fillStyle = "#0f172a"; gx.font = "bold 20px Arial, sans-serif";
      gx.textAlign = "left"; gx.textBaseline = "alphabetic";
      gx.fillText("拼接指引图", pad, pad + 20);
      gx.fillStyle = "#64748b"; gx.font = "13px Arial, sans-serif";
      gx.fillText(`${totalW}×${totalH} 豆 · ${cols}×${rows} 板 · 每板 ${pageBeads}×${pageBeads}`, pad, pad + 42);

      const ox = pad, oy = pad + headerH;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = ox + c * cellW, y = oy + r * cellH;
          const num = r * cols + c + 1;
          gx.fillStyle = "#f1f5f9"; gx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
          gx.strokeStyle = "#cbd5e1"; gx.lineWidth = 1; gx.strokeRect(x + .5, y + .5, cellW - 1, cellH - 1);
          gx.fillStyle = "#0f172a"; gx.font = "bold 18px Arial, sans-serif";
          gx.textAlign = "center"; gx.textBaseline = "middle";
          gx.fillText(String(num), x + cellW / 2, y + cellH / 2 - 6);
          const startX = c * pageBeads + 1, startY = r * pageBeads + 1;
          const endX = Math.min((c + 1) * pageBeads, totalW);
          const endY = Math.min((r + 1) * pageBeads, totalH);
          gx.fillStyle = "#94a3b8"; gx.font = "10px Arial, sans-serif";
          gx.fillText(`列${startX}-${endX} 行${startY}-${endY}`, x + cellW / 2, y + cellH / 2 + 12);

          if (c < cols - 1) {
            gx.fillStyle = "#6366f1";
            const ax = x + cellW - 1, ay = y + cellH / 2;
            gx.beginPath(); gx.moveTo(ax - 4, ay - 4); gx.lineTo(ax + 4, ay); gx.lineTo(ax - 4, ay + 4); gx.fill();
          }
          if (r < rows - 1) {
            gx.fillStyle = "#6366f1";
            const ax = x + cellW / 2, ay = y + cellH - 1;
            gx.beginPath(); gx.moveTo(ax - 4, ay - 4); gx.lineTo(ax, ay + 4); gx.lineTo(ax + 4, ay - 4); gx.fill();
          }
        }
      }
      return gc;
    }

    async function exportPagedPngZip() {
      if (!pattern.length) return;
      if (!spendCredits(2)) { showToast("积分不足（需要 2 积分）"); return; }
      pagedPngButton.disabled = true;
      statusText.textContent = "正在生成分页 PNG...";
      const beadHeight = pattern.length, beadWidth = pattern[0].length;
      const pageBeads = parseInt(pageBeadsInput.value, 10);
      const cols = Math.ceil(beadWidth / pageBeads), rows = Math.ceil(beadHeight / pageBeads);
      const files = [];
      for (let py = 0; py < rows; py++) {
        for (let px = 0; px < cols; px++) {
          const num = py * cols + px + 1;
          const pc = drawPageCanvas(px, py);
          const blob = await canvasToBlob(pc);
          files.push({ name: `pindou-page-${String(num).padStart(3, "0")}.png`, data: new Uint8Array(await blob.arrayBuffer()) });
        }
      }
      const guideCanvas = buildSpliceGuide(cols, rows, pageBeads, beadWidth, beadHeight);
      const guideBlob = await canvasToBlob(guideCanvas);
      files.push({ name: "00-splice-guide.png", data: new Uint8Array(await guideBlob.arrayBuffer()) });

      const zip = buildZip(files);
      const url = URL.createObjectURL(zip);
      const a = document.createElement("a"); a.href = url; a.download = "pindou-pattern-pages-png.zip"; a.click();
      URL.revokeObjectURL(url);
      pagedPngButton.disabled = false;
      statusText.textContent = "分页 PNG 已导出";
      showToast("分页 PNG 已导出（含拼接指引图）");
    }

    async function exportPixelArtPng() {
      if (!pattern.length) return;
      const bh = pattern.length, bw = pattern[0].length;
      const scale = Math.max(4, Math.floor(1200 / Math.max(bw, bh)));
      const pc = document.createElement("canvas");
      pc.width = bw * scale;
      pc.height = bh * scale;
      const pctx = pc.getContext("2d");
      for (let y = 0; y < bh; y++) {
        for (let x = 0; x < bw; x++) {
          const color = pattern[y][x];
          pctx.fillStyle = `rgb(${color[2].join(",")})`;
          pctx.fillRect(x * scale, y * scale, scale, scale);
        }
      }
      await saveImagePng(pc.toDataURL("image/png"), "pixel-art.png");
      showToast("像素画 PNG 已导出");
    }

    async function exportMaterialsPng() {
      if (!pattern.length) return;
      const palette = palettes[paletteInput.value];
      const used = palette.filter((c) => counts.has(c[0])).sort((a, b) => counts.get(b[0]) - counts.get(a[0]));
      const columns = used.length > 160 ? 6 : used.length > 110 ? 5 : used.length > 70 ? 4 : used.length > 36 ? 3 : used.length > 18 ? 2 : 1;
      const itemH = 28, colW = 190, margin = 24, headerH = 76;
      const rows = Math.ceil(used.length / columns);
      const mc = document.createElement("canvas");
      mc.width = columns * colW + margin * 2;
      mc.height = headerH + rows * itemH + margin;
      const mx = mc.getContext("2d");
      mx.fillStyle = "#fff"; mx.fillRect(0, 0, mc.width, mc.height);
      mx.fillStyle = "#1c2430"; mx.font = "bold 24px Arial, sans-serif";
      mx.textAlign = "left"; mx.textBaseline = "alphabetic";
      mx.fillText("拼豆颜色清单", margin, 34);
      mx.fillStyle = "#607083"; mx.font = "13px Arial, sans-serif";
      mx.fillText(`尺寸 ${pattern[0].length} x ${pattern.length}，总豆数 ${pattern[0].length * pattern.length}，颜色 ${used.length}`, margin, 58);

      for (let i = 0; i < used.length; i++) {
        const c = used[i], col = Math.floor(i / rows), row = i % rows;
        const x = margin + col * colW, y = headerH + row * itemH;
        mx.fillStyle = rgbText(c[2]); mx.fillRect(x, y - 17, 22, 22);
        mx.strokeStyle = "rgba(0,0,0,.22)"; mx.strokeRect(x + .5, y - 16.5, 21, 21);
        mx.fillStyle = "#1c2430"; mx.font = "bold 14px Arial, sans-serif"; mx.fillText(c[0], x + 30, y);
        mx.font = "12px Arial, sans-serif"; mx.fillStyle = "#607083"; mx.fillText(c[1], x + 72, y);
        mx.fillStyle = "#1c2430"; mx.font = "bold 14px Arial, sans-serif";
        mx.textAlign = "right"; mx.fillText(String(counts.get(c[0])), x + colW - 10, y); mx.textAlign = "left";
      }
      await saveImagePng(mc.toDataURL("image/png"), "pindou-materials.png");
      showToast("颜色清单已导出");
    }

    function buildSvg() {
      if (!pattern.length) return "";
      const bh = pattern.length, bw = pattern[0].length, cell = 24, ls = 34;
      const w = bw * cell + ls, h = bh * cell + ls;
      const p = [`<?xml version="1.0" encoding="UTF-8"?>`,
        `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`,
        `<style>.coord{font:11px Arial,sans-serif;fill:#607083;text-anchor:middle;dominant-baseline:middle}.code{font:${Math.max(8, Math.floor(cell * .38))}px Arial,sans-serif;font-weight:700;text-anchor:middle;dominant-baseline:middle}.grid{stroke:rgba(20,30,40,.28);stroke-width:1;shape-rendering:crispEdges}.major{stroke:rgba(20,30,40,.65);stroke-width:1;shape-rendering:crispEdges}</style>`,
        `<rect width="100%" height="100%" fill="#fff"/>`];
      for (let y = 0; y < bh; y++) for (let x = 0; x < bw; x++) {
        const c = pattern[y][x], px = ls + x * cell, py = ls + y * cell;
        const lum = c[2][0]*.299+c[2][1]*.587+c[2][2]*.114, tc = lum > 150 ? "#17202b" : "#fff";
        p.push(`<rect x="${px}" y="${py}" width="${cell}" height="${cell}" fill="${rgbText(c[2])}"/>`);
        if (symbolsInput.checked) p.push(`<text class="code" x="${px+cell/2}" y="${py+cell/2}" fill="${tc}">${xmlEscape(c[0])}</text>`);
      }
      if (gridInput.checked) {
        for (let x = 0; x <= bw; x++) { const px = ls+x*cell+.5; p.push(`<line class="${x%10===0?"major":"grid"}" x1="${px}" y1="${ls}" x2="${px}" y2="${ls+bh*cell}"/>`); }
        for (let y = 0; y <= bh; y++) { const py = ls+y*cell+.5; p.push(`<line class="${y%10===0?"major":"grid"}" x1="${ls}" y1="${py}" x2="${ls+bw*cell}" y2="${py}"/>`); }
      }
      for (let x = 0; x < bw; x += 5) p.push(`<text class="coord" x="${ls+x*cell+cell/2}" y="15">${x+1}</text>`);
      for (let y = 0; y < bh; y += 5) p.push(`<text class="coord" x="15" y="${ls+y*cell+cell/2}">${y+1}</text>`);
      p.push(`</svg>`);
      return p.join("\n");
    }

    function buildPagedSvg() {
      if (!pattern.length) return "";
      const bh = pattern.length, bw = pattern[0].length;
      const pb = parseInt(pageBeadsInput.value, 10);
      const cols = Math.ceil(bw/pb), rows = Math.ceil(bh/pb);
      const cell = 28, ls = 42, footer = 56, gap = 90;
      const pw = pb*cell+ls, ph = pb*cell+ls+footer;
      const tw = cols*pw+(cols-1)*gap, th = rows*ph+(rows-1)*gap;
      const p = [`<?xml version="1.0" encoding="UTF-8"?>`,
        `<svg xmlns="http://www.w3.org/2000/svg" width="${tw}" height="${th}" viewBox="0 0 ${tw} ${th}">`,
        `<style>.page-title{font:700 18px Arial,sans-serif;fill:#1c2430}.page-note{font:13px Arial,sans-serif;fill:#607083}.coord{font:11px Arial,sans-serif;fill:#607083;text-anchor:middle;dominant-baseline:middle}.code{font:${Math.max(10,Math.floor(cell*.42))}px Arial,sans-serif;font-weight:700;text-anchor:middle;dominant-baseline:middle}.grid{stroke:rgba(20,30,40,.32);stroke-width:1;shape-rendering:crispEdges}.major{stroke:rgba(20,30,40,.72);stroke-width:1.4;shape-rendering:crispEdges}.page-border{fill:#fff;stroke:#9fb0bd;stroke-width:2}</style>`,
        `<rect width="100%" height="100%" fill="#f4f7f9"/>`];
      for (let py = 0; py < rows; py++) for (let px = 0; px < cols; px++) {
        const pn = py*cols+px+1, ox = px*(pw+gap), oy = py*(ph+gap);
        const sx = px*pb, sy = py*pb, ex = Math.min(sx+pb,bw), ey = Math.min(sy+pb,bh);
        const aw = ex-sx, ah = ey-sy;
        p.push(`<g transform="translate(${ox},${oy})">`);
        p.push(`<rect class="page-border" x="0" y="0" width="${pw}" height="${ph}"/>`);
        p.push(`<text class="page-title" x="16" y="${ph-34}">第 ${pn} / ${cols*rows} 页</text>`);
        p.push(`<text class="page-note" x="16" y="${ph-14}">列 ${sx+1}-${ex}，行 ${sy+1}-${ey}</text>`);
        for (let y = sy; y < ey; y++) for (let x = sx; x < ex; x++) {
          const c = pattern[y][x], cpx = ls+(x-sx)*cell, cpy = ls+(y-sy)*cell;
          const lum = c[2][0]*.299+c[2][1]*.587+c[2][2]*.114, tc = lum > 150 ? "#17202b" : "#fff";
          p.push(`<rect x="${cpx}" y="${cpy}" width="${cell}" height="${cell}" fill="${rgbText(c[2])}"/>`);
          if (symbolsInput.checked) p.push(`<text class="code" x="${cpx+cell/2}" y="${cpy+cell/2}" fill="${tc}">${xmlEscape(c[0])}</text>`);
        }
        if (gridInput.checked) {
          for (let x = 0; x <= aw; x++) { const lx = ls+x*cell+.5; p.push(`<line class="${(sx+x)%10===0?"major":"grid"}" x1="${lx}" y1="${ls}" x2="${lx}" y2="${ls+ah*cell}"/>`); }
          for (let y = 0; y <= ah; y++) { const ly = ls+y*cell+.5; p.push(`<line class="${(sy+y)%10===0?"major":"grid"}" x1="${ls}" y1="${ly}" x2="${ls+aw*cell}" y2="${ly}"/>`); }
        }
        for (let x = sx; x < ex; x += 5) p.push(`<text class="coord" x="${ls+(x-sx)*cell+cell/2}" y="18">${x+1}</text>`);
        for (let y = sy; y < ey; y += 5) p.push(`<text class="coord" x="18" y="${ls+(y-sy)*cell+cell/2}">${y+1}</text>`);
        p.push(`</g>`);
      }
      p.push(`</svg>`);
      return p.join("\n");
    }

    // ========== Event Listeners ==========
    dropZone.addEventListener("click", () => file.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => { e.preventDefault(); dropZone.classList.remove("drag-over"); if (e.dataTransfer.files && e.dataTransfer.files.length) loadImageFile(e.dataTransfer.files[0]); });

    const emptyDefaultHtml = empty.innerHTML;

    function loadImageFile(selected) {
      if (!selected || !selected.type.startsWith("image/")) return;
      const img = new Image();
      img.onload = () => {
        sourceImage = img; sourceRatio = img.width / img.height; sourceFileName = selected.name;
        if (lockRatio.checked) heightInput.value = Math.max(8, Math.round(parseInt(widthInput.value, 10) / sourceRatio));
        statusText.textContent = selected.name;
        const previewUrl = URL.createObjectURL(selected);
        thumbImg.src = previewUrl;
        thumbName.textContent = selected.name;
        thumbDim.textContent = `${img.width} x ${img.height}`;
        thumbWrap.classList.add("visible");
        dropZone.style.display = "none";
        // show the imported image in the canvas area so mobile users see it landed
        if (!pattern.length) {
          empty.innerHTML = `<div><img src="${previewUrl}" style="max-width:72%;max-height:36vh;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15)"><br><strong>已导入图片</strong><br>点击「生成图纸」开始转换</div>`;
        }
      };
      img.src = URL.createObjectURL(selected);
    }

    file.addEventListener("change", () => { if (file.files && file.files[0]) loadImageFile(file.files[0]); });

    thumbRemove.addEventListener("click", () => {
      sourceImage = null; sourceFileName = ""; pattern = []; counts = new Map(); file.value = ""; hasGeneratedOnce = false;
      thumbWrap.classList.remove("visible"); dropZone.style.display = "";
      empty.hidden = false; canvasInner.hidden = true; zoomControls.style.display = "none"; legendSearchWrap.style.display = "none"; floatFit.hidden = true;
      pixelPreviewToggle.style.display = "none"; pixelArtMode = false; pixelPreviewToggle.classList.remove("active"); pixelPreviewToggle.textContent = "像素画预览";
      statusText.textContent = "等待导入图片"; finalSize.textContent = "-"; totalBeads.textContent = "-"; colorCount.textContent = "-";
      legend.innerHTML = ""; empty.innerHTML = emptyDefaultHtml;
      pngButton.disabled = true; pixelArtButton.disabled = true; svgButton.disabled = true; pagedSvgButton.disabled = true; pagedPngButton.disabled = true; materialsButton.disabled = true;
      $("mExport").disabled = true; $("mLegend").disabled = true;
    });

    function syncSliderVal(slider, display, suffix = "") {
      const update = () => { display.textContent = slider.value + suffix; };
      slider.addEventListener("input", update); update();
    }
    syncSliderVal(cropZoomInput, $("cropZoomVal"), "x");
    syncSliderVal(focusXInput, $("focusXVal"));
    syncSliderVal(focusYInput, $("focusYVal"));
    syncSliderVal(sharpenInput, $("sharpenVal"));
    syncSliderVal(vibranceInput, $("vibranceVal"));
    syncSliderVal(contrastInput, $("contrastVal"));
    syncSliderVal(cellInput, $("cellVal"), "px");

    widthInput.addEventListener("input", () => {
      if (lockRatio.checked && sourceImage) heightInput.value = Math.max(8, Math.round(parseInt(widthInput.value, 10) / sourceRatio));
      sizeText.textContent = `${widthInput.value} x ${heightInput.value}`;
    });
    heightInput.addEventListener("input", () => {
      if (lockRatio.checked && sourceImage) widthInput.value = Math.max(8, Math.round(parseInt(heightInput.value, 10) * sourceRatio));
      sizeText.textContent = `${widthInput.value} x ${heightInput.value}`;
    });

    document.querySelectorAll(".preset").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".preset").forEach((b) => b.classList.remove("active"));
        button.classList.add("active");
        const size = parseInt(button.dataset.size, 10);
        widthInput.value = size;
        heightInput.value = sourceImage && lockRatio.checked ? Math.max(8, Math.round(size / sourceRatio)) : size;
        sizeText.textContent = `${widthInput.value} x ${heightInput.value}`;
        buildPattern();
      });
    });

    $("nativeSize").addEventListener("click", () => {
      if (!sourceImage) return;
      document.querySelectorAll(".preset").forEach((b) => b.classList.remove("active"));
      const scale = Math.min(1, 600 / Math.max(sourceImage.naturalWidth, sourceImage.naturalHeight));
      widthInput.value = Math.max(8, Math.round(sourceImage.naturalWidth * scale));
      heightInput.value = Math.max(8, Math.round(sourceImage.naturalHeight * scale));
      sizeText.textContent = `${widthInput.value} x ${heightInput.value}`;
      buildPattern();
    });

    const autoPreviewInput = $("autoPreview");
    const debouncedBuild = debounce(() => { if (hasGeneratedOnce && autoPreviewInput.checked) buildPattern(true); }, 250);
    const autoBuild = () => { if (hasGeneratedOnce && autoPreviewInput.checked) buildPattern(true); };

    $("generate").addEventListener("click", () => buildPattern(false));
    paletteInput.addEventListener("change", autoBuild);
    maxColorsInput.addEventListener("change", autoBuild);
    artisanModeInput.addEventListener("change", autoBuild);
    colorSafeInput.addEventListener("change", autoBuild);
    artisanStrengthInput.addEventListener("change", autoBuild);
    ditherInput.addEventListener("change", autoBuild);
    crispInput.addEventListener("change", autoBuild);
    cleanupInput.addEventListener("change", autoBuild);
    mirrorInput.addEventListener("change", autoBuild);
    sharpenInput.addEventListener("input", debouncedBuild);
    vibranceInput.addEventListener("input", debouncedBuild);
    contrastInput.addEventListener("input", debouncedBuild);
    cropZoomInput.addEventListener("input", debouncedBuild);
    focusXInput.addEventListener("input", debouncedBuild);
    focusYInput.addEventListener("input", debouncedBuild);
    widthInput.addEventListener("input", debouncedBuild);
    heightInput.addEventListener("input", debouncedBuild);
    symbolsInput.addEventListener("change", renderPattern);
    gridInput.addEventListener("change", renderPattern);
    cellInput.addEventListener("input", renderPattern);
    $("print").addEventListener("click", () => window.print());

    pngButton.addEventListener("click", async () => {
      if (!spendCredits(1)) { showToast("积分不足（需要 1 积分）"); return; }
      await saveImagePng(canvas.toDataURL("image/png"), "pindou-pattern.png");
      showToast("PNG 已导出");
    });

    pixelArtButton.addEventListener("click", exportPixelArtPng);

    pixelPreviewToggle.addEventListener("click", () => {
      pixelArtMode = !pixelArtMode;
      pixelPreviewToggle.classList.toggle("active", pixelArtMode);
      pixelPreviewToggle.textContent = pixelArtMode ? "切回图纸" : "像素画预览";
      renderPattern();
      requestAnimationFrame(() => zoomToFit());
    });

    // Mobile bottom bar + settings drawer
    const mExportButton = $("mExport");
    const exportSheet = $("exportSheet");
    const drawerOverlay = $("drawerOverlay");
    const asideEl = document.querySelector("aside");

    const summaryEl = document.querySelector(".summary");

    function openDrawer() {
      summaryEl.classList.remove("open");
      asideEl.classList.add("open");
      drawerOverlay.classList.add("open");
    }
    function closeDrawer() {
      asideEl.classList.remove("open");
      summaryEl.classList.remove("open");
      drawerOverlay.classList.remove("open");
    }

    $("mSettings").addEventListener("click", () => {
      asideEl.classList.contains("open") ? closeDrawer() : openDrawer();
    });
    drawerOverlay.addEventListener("click", closeDrawer);

    // tutorial video modal
    const videoModal = $("videoModal");
    const tutorialVideo = $("tutorialVideo");
    function openTutorialModal() {
      closeDrawer();
      videoModal.classList.add("open");
      tutorialVideo.play().catch(() => {});
    }
    $("openTutorial").addEventListener("click", openTutorialModal);
    $("videoClose").addEventListener("click", () => { videoModal.classList.remove("open"); tutorialVideo.pause(); });
    videoModal.addEventListener("click", (e) => {
      if (e.target === videoModal) { videoModal.classList.remove("open"); tutorialVideo.pause(); }
    });

    $("mLegend").addEventListener("click", () => {
      if (summaryEl.classList.contains("open")) { closeDrawer(); return; }
      asideEl.classList.remove("open");
      summaryEl.classList.add("open");
      drawerOverlay.classList.add("open");
    });

    $("mGenerate").addEventListener("click", () => {
      closeDrawer();
      if (!sourceImage) { showToast("请先选择图片"); file.click(); return; }
      buildPattern(false);
    });
    mExportButton.addEventListener("click", () => exportSheet.classList.add("open"));

    // tapping the empty canvas area opens the image picker
    // (delegated: the tutorial button inside survives innerHTML swaps)
    empty.addEventListener("click", (e) => {
      if (e.target.closest("#watchTutorial")) { openTutorialModal(); return; }
      file.click();
    });
    $("sheetClose").addEventListener("click", () => exportSheet.classList.remove("open"));
    exportSheet.addEventListener("click", (e) => {
      if (e.target === exportSheet) exportSheet.classList.remove("open");
    });
    $("sPng").addEventListener("click", () => { exportSheet.classList.remove("open"); pngButton.click(); });
    $("sPixelArt").addEventListener("click", () => { exportSheet.classList.remove("open"); exportPixelArtPng(); });
    $("sPagedPng").addEventListener("click", () => { exportSheet.classList.remove("open"); exportPagedPngZip(); });
    $("sMaterials").addEventListener("click", () => { exportSheet.classList.remove("open"); exportMaterialsPng(); });

    svgButton.addEventListener("click", () => {
      if (!spendCredits(1)) { showToast("积分不足（需要 1 积分）"); return; }
      download("pindou-pattern.svg", buildSvg(), "image/svg+xml;charset=utf-8");
      showToast("SVG 已导出");
    });

    pagedSvgButton.addEventListener("click", () => {
      if (!spendCredits(2)) { showToast("积分不足（需要 2 积分）"); return; }
      download("pindou-pattern-pages.svg", buildPagedSvg(), "image/svg+xml;charset=utf-8");
      showToast("分页 SVG 已导出");
    });

    pagedPngButton.addEventListener("click", exportPagedPngZip);
    materialsButton.addEventListener("click", exportMaterialsPng);

    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); buildPattern(); }
    });

    document.querySelectorAll("[data-toggle]").forEach(t => {
      t.addEventListener("click", () => t.closest(".group").classList.toggle("collapsed"));
    });

    document.addEventListener("paste", (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          e.preventDefault();
          const blob = item.getAsFile();
          if (blob) loadImageFile(new File([blob], "pasted-image.png", { type: blob.type }));
          break;
        }
      }
    });
  </script>
</body>
</html>
