<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拼豆图纸生成器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Cabin:wght@400;500;600;700&display=swap');

    :root {
      --ink: #FAFAF9;
      --ink-2: #E7E5E4;
      --muted: #A8A29E;
      --line: rgba(255,255,255,.07);
      --line-light: rgba(255,255,255,.09);
      --panel: #292524;
      --bg: #1C1917;
      --accent: #EA580C;
      --accent-glow: rgba(234,88,12,.25);
      --accent-2: #C2410C;
      --accent-2-glow: rgba(194,65,12,.2);
      --sidebar: #221E1B;
      --sidebar-surface: rgba(255,255,255,.05);
      --sidebar-text: #E7E5E4;
      --sidebar-muted: #A8A29E;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; margin: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Cabin', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      height: 100dvh;
      overflow: hidden;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      height: 100dvh;
    }

    aside {
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 20px 18px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.1) transparent;
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    main {
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.2px;
      margin-bottom: 2px;
      color: #fff;
    }

    .sub {
      margin-bottom: 16px;
      color: var(--sidebar-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .group {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .group:first-of-type { border-top: 0; padding-top: 0; }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
      margin-bottom: 10px;
    }

    .group-title span {
      font-size: 12px;
      font-weight: 600;
      color: var(--sidebar-muted);
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .group-title::after {
      content: "▾";
      font-size: 10px;
      color: var(--sidebar-muted);
      transition: transform .2s;
    }

    .group.collapsed .group-title::after { transform: rotate(-90deg); }
    .group.collapsed .group-body { display: none; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--sidebar-muted);
      margin-bottom: 5px;
      margin-top: 8px;
    }

    label:first-child { margin-top: 0; }

    input[type="file"] { display: none; }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      min-height: 34px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 7px;
      background: var(--sidebar-surface);
      color: var(--sidebar-text);
      padding: 6px 10px;
      font: inherit;
      font-size: 13px;
      transition: border-color .15s;
    }

    input[type="number"]:focus,
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    select { cursor: pointer; }
    select option { background: var(--sidebar); color: var(--sidebar-text); }

    /* Custom range slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.1);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--accent-glow);
      transition: transform .15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--sidebar-muted);
      cursor: pointer;
      transition: color .15s;
    }

    .check:hover { color: var(--sidebar-text); }

    .check input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }

    .check input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4.5px;
      top: 1.5px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 34px;
      border: 0;
      border-radius: 7px;
      padding: 7px 12px;
      font: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: opacity .15s, transform .12s;
    }

    button:hover:not(:disabled) { opacity: .88; }
    button:active:not(:disabled) { opacity: .8; transform: scale(.97); }

    :is(button, input, select, .check, .legend-item):focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .brand-latin {
      font-family: 'Amatic SC', cursive;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-left: 6px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }

    button.secondary {
      background: var(--accent-2);
    }

    button.ghost {
      color: var(--sidebar-text);
      background: var(--sidebar-surface);
      border: 1px solid rgba(255,255,255,.08);
    }

    button.ghost:hover:not(:disabled) { background: rgba(255,255,255,.1); opacity: 1; }

    .preset {
      min-height: 30px;
      padding: 5px 4px;
      color: var(--sidebar-muted);
      background: var(--sidebar-surface);
      border: 1px solid rgba(255,255,255,.06);
      font-size: 11px;
      font-weight: 600;
      transition: all .15s;
    }

    .preset:hover { color: var(--sidebar-text); background: rgba(255,255,255,.1); opacity: 1; }

    .preset.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .full { width: 100%; margin-top: 6px; }

    .buttons .wide { grid-column: 1 / -1; }

    button:disabled { opacity: .3; cursor: not-allowed; }

    .credits-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      background: var(--sidebar-surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
    }

    .credits-bar-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .credits-bar-left .coin { font-size: 18px; }

    .credits-num {
      font-size: 18px;
      font-weight: 700;
      color: #FDBA74;
      font-variant-numeric: tabular-nums;
    }

    .credits-label {
      color: var(--sidebar-muted);
      font-weight: 500;
      font-size: 12px;
    }

    .credits-bar button {
      min-height: 28px;
      padding: 4px 14px;
      font-size: 11px;
      border-radius: 6px;
      background: var(--accent);
    }

    /* ===== CDK Modal ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      place-items: center;
    }

    .modal-overlay.open { display: grid; }

    .modal {
      background: var(--panel);
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-lg);
    }

    .modal h2 {
      margin-bottom: 6px;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
    }

    .modal p {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .modal input[type="text"] {
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
      font-weight: 700;
      border: 2px solid var(--line-light);
      background: rgba(255,255,255,.05);
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 48px;
    }

    .modal input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      outline: none;
    }

    .modal .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal .btn-row button {
      flex: 1;
      min-height: 44px;
      font-size: 14px;
      border-radius: var(--radius);
    }

    .modal .btn-row .ghost {
      color: var(--ink);
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line-light);
    }

    .modal .msg {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      font-weight: 600;
    }

    .modal .msg.ok { color: #4ADE80; }
    .modal .msg.err { color: #F87171; }

    .cdk-cost {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      opacity: .7;
      font-weight: 500;
      margin-left: 4px;
    }

    /* ===== Admin Panel ===== */
    .admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(8px);
      z-index: 1001;
      place-items: center;
    }

    .admin-overlay.open { display: grid; }

    .admin-panel {
      background: var(--panel);
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 92%;
      max-height: 85vh;
      overflow: auto;
      box-shadow: var(--shadow-lg);
    }

    .admin-panel h2 {
      margin-bottom: 4px;
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
    }

    .admin-panel .admin-sub {
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .admin-row {
      display: flex;
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
    }

    .admin-row > div { flex: 1; }

    .admin-row label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .admin-row input, .admin-row select {
      min-height: 40px;
      font-size: 14px;
      border: 2px solid var(--line-light);
      background: rgba(255,255,255,.05);
      color: var(--ink);
    }

    .admin-row button {
      min-height: 40px;
      flex-shrink: 0;
      padding: 8px 20px;
      font-size: 14px;
    }

    .cdk-output {
      background: #171412;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 300px;
      overflow: auto;
      font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
      font-size: 13px;
      line-height: 2.2;
      user-select: all;
      white-space: pre-wrap;
      word-break: break-all;
      color: #FDBA74;
    }

    .cdk-output:empty::after {
      content: "生成的 CDK 将显示在这里";
      color: var(--muted);
    }

    .admin-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .admin-footer button { min-height: 36px; font-size: 13px; padding: 6px 18px; }

    .admin-stats { font-size: 12px; color: var(--muted); font-weight: 500; }

    .drop-zone {
      border: 1.5px dashed rgba(255,255,255,.12);
      border-radius: 8px;
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: var(--sidebar-surface);
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(99,102,241,.06);
    }

    .drop-zone-icon {
      font-size: 28px;
      line-height: 1;
      margin-bottom: 6px;
      opacity: .35;
    }

    .drop-zone-text {
      font-size: 12px;
      color: var(--sidebar-muted);
      line-height: 1.5;
    }

    .drop-zone-text b { color: var(--accent); }

    .thumb-wrap {
      display: none;
      margin-top: 10px;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
    }

    .thumb-wrap.visible { display: block; }

    .thumb-wrap img {
      display: block;
      width: 100%;
      max-height: 150px;
      object-fit: cover;
    }

    .thumb-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.75));
      color: #fff;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
    }

    .thumb-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 0;
      background: rgba(0,0,0,.6);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0;
      backdrop-filter: blur(4px);
    }

    .thumb-remove:hover { background: var(--accent); filter: none; box-shadow: none; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-row input[type="range"] { flex: 1; }

    .slider-val {
      min-width: 34px;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      color: #FDBA74;
      font-variant-numeric: tabular-nums;
    }

    .stage {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      align-items: stretch;
    }

    .board-wrap {
      background: var(--panel);
      border: 1px solid var(--line-light);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .summary {
      background: var(--panel);
      border: 1px solid var(--line-light);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--line-light);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      background: var(--sidebar);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .zoom-controls button {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 13px;
      background: rgba(255,255,255,.14);
      color: var(--ink-2);
      border-radius: 6px;
    }

    .zoom-controls button:hover { background: rgba(255,255,255,.22); filter: none; box-shadow: none; }

    .fit-btn {
      font-size: 11px;
      padding: 4px 8px;
    }

    .pixel-toggle {
      font-size: 11px;
      padding: 4px 8px;
    }
    .pixel-toggle.active {
      background: var(--accent) !important;
      color: #fff !important;
      opacity: 1;
    }

    @media (max-width: 980px) {
      .fit-btn {
        background: var(--accent) !important;
        color: #fff !important;
        font-size: 13px !important;
        padding: 6px 14px !important;
        border-radius: 6px;
        font-weight: 700;
        min-height: 32px;
      }
    }

    .zoom-controls span {
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      color: var(--ink-2);
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      background: #fff;
      transform-origin: 0 0;
    }

    .canvas-box {
      padding: 16px;
      overflow: auto;
      position: relative;
      cursor: grab;
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }

    .canvas-box:active { cursor: grabbing; }

    .canvas-inner { display: inline-block; position: relative; }
    .canvas-inner[hidden] { display: none !important; }

    .empty {
      display: grid;
      height: 100%;
      place-items: center;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
    .empty[hidden] { display: none !important; }

    .bead-tip {
      position: absolute;
      z-index: 20;
      background: rgba(23,20,18,.94);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.4;
      transform: translate(-50%, -110%);
    }
    .bead-tip[hidden] { display: none !important; }
    .bead-tip .tip-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,.3);
      flex-shrink: 0;
    }

    .float-fit {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      min-height: 32px;
    }
    .float-fit { display: none !important; } /* toolbar fit button is always visible in single-screen layout */
    .float-fit:active { opacity: .7; }
    .float-fit[hidden] { display: none !important; }

    .empty strong { font-size: 14px; color: var(--muted); display: block; margin-bottom: 4px; }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .stat b {
      font-size: 17px;
      font-weight: 800;
      color: var(--ink);
    }

    .legend-search {
      margin-top: 14px;
      position: relative;
    }

    .legend-search input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line-light);
      border-radius: 8px;
      padding: 6px 10px 6px 32px;
      font: inherit;
      font-size: 12px;
      background: rgba(255,255,255,.05);
      color: var(--ink);
    }

    .legend-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .legend-search::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23A8A29E" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>') center/contain no-repeat;
    }

    .watch-tutorial {
      margin-top: 14px;
      background: transparent;
      border: 1px solid var(--line-light);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      padding: 8px 16px;
    }
    .watch-tutorial:hover { border-color: var(--accent); opacity: 1; }

    .tutorial-btn { width: 100%; margin-top: 8px; font-size: 12px; }

    .video-modal { max-width: 880px; width: 94%; padding: 18px; }
    .video-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .video-modal-head h2 { margin: 0; }
    .video-modal-head button { min-height: 34px; padding: 6px 14px; }
    .video-modal video {
      width: 100%;
      border-radius: 10px;
      background: #000;
      display: block;
    }

    /* inline icons inherit text color and align with text */
    svg.i { vertical-align: -2px; display: inline-block; }

    .legend {
      margin-top: 10px;
      display: grid;
      gap: 4px;
      max-height: 400px;
      overflow: auto;
      padding-right: 4px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 20px 28px 1fr auto;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background .15s;
    }

    .legend-item:hover { background: rgba(255,255,255,.05); }
    .legend-item.filtered { display: none; }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 0 0 1px rgba(0,0,0,.1);
    }

    .legend-item strong { color: var(--ink); font-size: 11px; }
    .legend-item b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }

    .hint {
      margin-top: 8px;
      font-size: 10.5px;
      line-height: 1.5;
      color: rgba(255,255,255,.2);
    }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
      display: none;
    }

    .progress-bar.active { display: block; }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #fbbf24);
      border-radius: 2px;
      transition: width .15s;
      width: 0%;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #171412;
      color: var(--ink);
      border: 1px solid rgba(234,88,12,.4);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .25s;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Tablet */
    @media (max-width: 1100px), (pointer: coarse) {
      .stage { grid-template-columns: 1fr; }
    }

    /* Mobile bottom action bar + export sheet (hidden on desktop) */
    .mobile-bar { display: none; }

    /* show on narrow screens OR any touch device (covers iPad landscape) */
    @media (max-width: 1100px), (pointer: coarse) {
      .mobile-bar {
        display: grid;
        grid-template-columns: 1fr 1.35fr 1fr 1fr;
        gap: 8px;
        position: fixed;
        left: 0; right: 0; bottom: 0;
        z-index: 60;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: rgba(23,20,18,.94);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-top: 1px solid rgba(255,255,255,.1);
      }
      .mobile-bar button {
        min-height: 48px;
        border: 0;
        border-radius: 11px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .mobile-bar .m-generate { background: var(--accent); color: #fff; }
      .mobile-bar .m-secondary { background: rgba(255,255,255,.1); color: var(--ink-2); }
      .mobile-bar button:disabled { opacity: .35; }
    }
    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      background: rgba(12,10,9,.6);
      display: none;
    }
    .sheet-overlay.open { display: block; }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--panel);
      border-radius: 18px 18px 0 0;
      padding: 18px 16px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -12px 40px rgba(0,0,0,.2);
      display: grid;
      gap: 10px;
    }
    .sheet-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2px;
    }
    .sheet button {
      min-height: 50px;
      border: 1px solid var(--line-light);
      border-radius: 12px;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .sheet button:disabled { opacity: .4; }
    .sheet .sheet-cancel {
      background: transparent;
      border: 0;
      color: var(--muted);
      font-weight: 500;
    }

    /* Mobile + Tablet shared */
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.06);
        padding: 20px 16px;
        max-height: none;
      }
      main { padding: 16px; }
      aside { padding-bottom: 24px; }
      /* the sidebar export buttons are redundant on mobile — the bar covers them */
      .buttons #png, .buttons #pixelArt, .buttons #pagedPng, .buttons #materials { display: none; }
      h1 { font-size: 20px; }
      .credits-bar { padding: 10px 12px; }
      .credits-num { font-size: 18px; }
      .drop-zone { padding: 20px 12px; }
      .canvas-box {
        max-height: 60vh;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y;
      }
      .toolbar { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
      .modal { padding: 24px 20px; width: 94%; }
      .admin-panel { padding: 24px 18px; width: 96%; }
    }

    /* Phone */
    @media (max-width: 640px) {
      aside { padding: 16px 14px; }
      main { padding: 12px; }
      h1 { font-size: 18px; }
      .sub { font-size: 12px; margin-bottom: 14px; }
      .credits-bar { flex-wrap: wrap; gap: 6px; }
      .credits-bar-left .coin { font-size: 18px; }
      .credits-num { font-size: 18px; }
      .credits-bar button { width: 100%; margin-top: 4px; }
      .row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .presets { grid-template-columns: repeat(3, 1fr); gap: 5px; }
      .preset { font-size: 11px; min-height: 36px; }
      .buttons { grid-template-columns: 1fr; gap: 8px; }
      .buttons .wide { grid-column: auto; }
      button { min-height: 44px; font-size: 14px; }
      .check { font-size: 13px; min-height: 36px; }
      .check input[type="checkbox"] { width: 20px; height: 20px; }
      input[type="number"], input[type="text"], select {
        min-height: 44px;
        font-size: 15px;
      }
      input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
      input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; }
      .slider-row { gap: 12px; }
      .slider-val { font-size: 13px; min-width: 42px; }
      .drop-zone { padding: 24px 12px; }
      .drop-zone-icon { font-size: 28px; }
      .canvas-box { max-height: 50vh; padding: 8px; }
      .toolbar { font-size: 12px; padding: 8px 10px; }
      .zoom-controls button { min-height: 32px; padding: 6px 10px; }
      .summary { padding: 14px; border-radius: 10px; }
      .stat { font-size: 13px; padding: 8px 0; }
      .stat b { font-size: 15px; }
      .legend-item { font-size: 12px; padding: 5px 4px; }
      .swatch { width: 18px; height: 18px; }
      .legend { max-height: 300px; }
      .modal { padding: 20px 16px; border-radius: 14px; }
      .modal h2 { font-size: 18px; }
      .modal input[type="text"] { min-height: 48px; font-size: 18px; }
      .modal .btn-row { flex-direction: column; }
      .modal .btn-row button { min-height: 48px; font-size: 15px; }
      .admin-panel { padding: 20px 14px; border-radius: 14px; }
      .admin-row { flex-direction: column; gap: 8px; }
      .admin-row button { width: 100%; min-height: 44px; }
      .cdk-output { font-size: 12px; line-height: 2; max-height: 220px; }
      .admin-footer { flex-direction: column; gap: 10px; align-items: stretch; }
      .admin-footer button { width: 100%; }
      .hint { font-size: 11px; }
      .toast { font-size: 12px; padding: 10px 16px; bottom: 16px; max-width: 90vw; }
      .group { padding: 12px 0; }
      label { font-size: 10.5px; }
    }

    /* Touch-friendly: larger tap targets */
    @media (pointer: coarse) {
      button { min-height: 44px; }
      .preset { min-height: 40px; }
      .check { min-height: 40px; gap: 10px; }
      .check input[type="checkbox"] { width: 22px; height: 22px; }
      input[type="range"] { height: 6px; }
      input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }
      input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; }
      .zoom-controls button { min-height: 36px; min-width: 36px; }
      .thumb-remove { width: 32px; height: 32px; font-size: 16px; }
      .legend-item { padding: 6px; min-height: 36px; }
    }

    /* App-like layout on touch devices: full-screen canvas, settings in a bottom drawer */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 58;
      background: rgba(12,10,9,.6);
      display: none;
    }
    .drawer-overlay.open { display: block; }

    @media (max-width: 1100px), (pointer: coarse) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: fixed;
        left: 0; right: 0; bottom: 0; top: auto;
        height: 78dvh;
        max-height: 78dvh;
        z-index: 59;
        transform: translateY(105%);
        transition: transform .28s ease;
        border-radius: 20px 20px 0 0;
        border-bottom: 0;
        overflow-y: auto;
        padding: 18px 16px calc(90px + env(safe-area-inset-bottom));
        box-shadow: 0 -16px 48px rgba(0,0,0,.35);
      }
      aside.open { transform: translateY(0); }
      /* legend/summary becomes a bottom sheet too */
      .summary {
        position: fixed;
        left: 0; right: 0; bottom: 0; top: auto;
        height: 70dvh;
        z-index: 59;
        transform: translateY(105%);
        transition: transform .28s ease;
        border-radius: 20px 20px 0 0;
        overflow-y: auto;
        padding: 18px 16px calc(90px + env(safe-area-inset-bottom));
        box-shadow: 0 -16px 48px rgba(0,0,0,.35);
      }
      .summary.open { transform: translateY(0); }
      main {
        padding: 10px;
        padding-bottom: calc(72px + env(safe-area-inset-bottom));
      }
      .canvas-box { max-height: none; min-height: 0; }
      .empty { min-height: 0; cursor: pointer; }
      /* export buttons live in the bottom bar's sheet; generate lives in the bar */
      .buttons #png, .buttons #pixelArt, .buttons #pagedPng, .buttons #materials { display: none; }
    }

    @media print {
      html, body { height: auto; overflow: visible; }
      .app { height: auto; display: block; }
      main { overflow: visible; display: block; }
      .summary { position: static; transform: none; height: auto; }
      body { background: #fff; }
      aside, .toolbar, .buttons, .hint, .toast, .legend-search, .credits-bar, .mobile-bar, .sheet-overlay, .drawer-overlay { display: none !important; }
      .app, .stage { display: block; }
      main { padding: 0; }
      .board-wrap, .summary { box-shadow: none; border: 0; }
      .canvas-box { padding: 0; max-height: none; overflow: visible; cursor: default; }
      .summary { margin-top: 16px; page-break-before: always; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>拼豆图纸生成器 <span class="brand-latin">Pindou Studio</span></h1>
      <p class="sub">导入图片，自动像素化成拼豆格子图，并生成颜色编号和豆子用量。</p>

      <!-- Credits bar -->
      <div class="credits-bar">
        <div class="credits-bar-left">
          <span class="coin"><svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 10.5c0-1 1-1.7 2.5-1.7s2.5.7 2.5 1.7-1 1.4-2.5 1.7-2.5.7-2.5 1.7 1 1.7 2.5 1.7 2.5-.7 2.5-1.7"/></svg></span>
          <span class="credits-num" id="creditsNum">0</span>
          <span class="credits-label">积分</span>
        </div>
        <button type="button" id="openCdkBtn">兑换 CDK</button>
        <button type="button" class="ghost tutorial-btn" id="openTutorial">▶ 使用教程</button>
      </div>

      <div class="group">
        <div class="drop-zone" id="dropZone">
          <input id="file" type="file" accept="image/*">
          <div class="drop-zone-icon"><svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="30" height="30" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>
          <div class="drop-zone-text">点击选择或<b>拖拽图片</b></div>
        </div>
        <div class="thumb-wrap" id="thumbWrap">
          <img id="thumbImg" alt="preview">
          <button class="thumb-remove" id="thumbRemove" type="button">✕</button>
          <div class="thumb-info">
            <span id="thumbName">-</span>
            <span id="thumbDim">-</span>
          </div>
        </div>
      </div>

      <div class="group">
        <div class="group-title" data-toggle><span>尺寸</span></div>
        <div class="group-body">
          <div class="row">
            <div>
              <label for="width">宽度</label>
              <input id="width" type="number" min="8" max="600" value="160">
            </div>
            <div>
              <label for="height">高度</label>
              <input id="height" type="number" min="8" max="600" value="160">
            </div>
          </div>
          <label class="check"><input id="lockRatio" type="checkbox" checked> 保持比例</label>
          <div class="presets">
            <button class="preset" data-size="48" type="button">48</button>
            <button class="preset" data-size="96" type="button">96</button>
            <button class="preset active" data-size="160" type="button">160</button>
            <button class="preset" data-size="220" type="button">220</button>
            <button class="preset" data-size="300" type="button">300</button>
            <button class="preset" data-size="480" type="button">480</button>
          </div>
          <button id="nativeSize" class="ghost full" type="button">按原图像素</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title" data-toggle><span>裁剪</span></div>
        <div class="group-body">
          <label for="cropZoom">放大</label>
          <div class="slider-row">
            <input id="cropZoom" type="range" min="1" max="5" value="1" step="0.05">
            <span class="slider-val" id="cropZoomVal">1x</span>
          </div>
          <div class="row">
            <div>
              <label for="focusX">左右</label>
              <div class="slider-row">
                <input id="focusX" type="range" min="0" max="100" value="50">
                <span class="slider-val" id="focusXVal">50</span>
              </div>
            </div>
            <div>
              <label for="focusY">上下</label>
              <div class="slider-row">
                <input id="focusY" type="range" min="0" max="100" value="50">
                <span class="slider-val" id="focusYVal">50</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="group">
        <div class="group-title" data-toggle><span>颜色</span></div>
        <div class="group-body">
          <label for="palette">颜色库</label>
          <select id="palette">
            <option value="mard221">MARD 221 色</option>
            <option value="artkalA">Artkal A 系 228 色</option>
            <option value="hama">Hama 68 色</option>
          </select>
          <label for="maxColors">最大颜色</label>
          <select id="maxColors">
            <option value="32">32 色</option>
            <option value="48">48 色</option>
            <option value="64">64 色</option>
            <option value="96">96 色</option>
            <option value="128" selected>128 色</option>
            <option value="221">全部 221 色</option>
          </select>
          <label class="check"><input id="artisanMode" type="checkbox" checked> 人工优化</label>
          <label class="check"><input id="colorSafe" type="checkbox" checked> 保留原色</label>
          <label for="artisanStrength">优化强度</label>
          <select id="artisanStrength">
            <option value="soft">轻度</option>
            <option value="normal" selected>标准</option>
            <option value="strong">强力</option>
          </select>
          <label class="check"><input id="dither" type="checkbox"> 抖动</label>
          <label class="check"><input id="crisp" type="checkbox"> 硬边模式</label>
          <label class="check"><input id="cleanup" type="checkbox" checked> 清理噪点</label>
          <label for="sharpen">锐化</label>
          <div class="slider-row">
            <input id="sharpen" type="range" min="0" max="2" value="0.25" step="0.25">
            <span class="slider-val" id="sharpenVal">0.25</span>
          </div>
          <label for="vibrance">鲜艳度</label>
          <div class="slider-row">
            <input id="vibrance" type="range" min="0" max="1.5" value="0.4" step="0.1">
            <span class="slider-val" id="vibranceVal">0.4</span>
          </div>
          <label for="contrast">对比度</label>
          <div class="slider-row">
            <input id="contrast" type="range" min="0" max="80" value="15" step="5">
            <span class="slider-val" id="contrastVal">15</span>
          </div>
        </div>
      </div>

      <div class="group">
        <div class="group-title" data-toggle><span>显示</span></div>
        <div class="group-body">
          <label class="check"><input id="autoPreview" type="checkbox" checked> 实时预览</label>
          <label class="check"><input id="mirror" type="checkbox"> 水平镜像</label>
          <label class="check"><input id="symbols" type="checkbox" checked> 颜色编号</label>
          <label class="check"><input id="grid" type="checkbox" checked> 格线</label>
          <label for="cell">格子大小</label>
          <div class="slider-row">
            <input id="cell" type="range" min="10" max="34" value="20">
            <span class="slider-val" id="cellVal">20px</span>
          </div>
          <label for="pageBeads">分页</label>
          <select id="pageBeads">
            <option value="30">30 × 30</option>
            <option value="40" selected>40 × 40</option>
            <option value="50">50 × 50</option>
            <option value="60">60 × 60</option>
          </select>
        </div>
      </div>

      <div class="group">
        <div class="progress-bar" id="progress"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="buttons">
          <button id="generate">生成图纸 <span class="cdk-cost"><svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 10.5c0-1 1-1.7 2.5-1.7s2.5.7 2.5 1.7-1 1.4-2.5 1.7-2.5.7-2.5 1.7 1 1.7 2.5 1.7 2.5-.7 2.5-1.7"/></svg>1</span></button>
          <button id="print" class="ghost">打印</button>
          <button id="png" class="secondary" disabled>导出 PNG <span class="cdk-cost"><svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 10.5c0-1 1-1.7 2.5-1.7s2.5.7 2.5 1.7-1 1.4-2.5 1.7-2.5.7-2.5 1.7 1 1.7 2.5 1.7 2.5-.7 2.5-1.7"/></svg>1</span></button>
          <button id="pixelArt" class="secondary" disabled>导出像素画 PNG</button>
          <button id="pagedPng" class="secondary wide" disabled>导出分页 PNG <span class="cdk-cost"><svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 10.5c0-1 1-1.7 2.5-1.7s2.5.7 2.5 1.7-1 1.4-2.5 1.7-2.5.7-2.5 1.7 1 1.7 2.5 1.7 2.5-.7 2.5-1.7"/></svg>2</span></button>
          <button id="materials" class="secondary" disabled>导出清单</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="stage">
        <section class="board-wrap">
          <div class="toolbar">
            <span id="status">等待导入图片</span>
            <div class="toolbar-right">
              <div class="zoom-controls" id="zoomControls" style="display:none">
                <button type="button" id="zoomOut">−</button>
                <span id="zoomLevel">100%</span>
                <button type="button" id="zoomIn">+</button>
                <button type="button" id="zoomFit" class="ghost fit-btn">适应屏幕</button>
              </div>
              <button type="button" id="pixelPreviewToggle" class="ghost pixel-toggle" style="display:none">像素画预览</button>
              <span id="sizeText">160 x 160</span>
            </div>
          </div>
          <div class="canvas-box" id="canvasBox">
            <div id="beadTip" class="bead-tip" hidden></div>
            <button type="button" id="floatFit" class="float-fit" hidden>适应屏幕</button>
            <div id="empty" class="empty">
              <div>
                <strong>把图片变成拼豆图纸</strong>
                <br>点击此处导入图片，然后点「生成图纸」。
                <br><button type="button" class="watch-tutorial" id="watchTutorial">▶ 观看使用教程</button>
              </div>
            </div>
            <div class="canvas-inner" id="canvasInner" hidden>
              <canvas id="canvas"></canvas>
            </div>
          </div>
        </section>

        <section class="summary">
          <div class="stat"><span>成品尺寸</span><b id="finalSize">-</b></div>
          <div class="stat"><span>总豆数</span><b id="totalBeads">-</b></div>
          <div class="stat"><span>颜色数量</span><b id="colorCount">-</b></div>

    // ========== CDK & Credits System ==========
    const CDK_SECRET = "pindou_2026_yile";

    function simpleHash(str) {
      let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
      for (let i = 0; i < str.length; i++) {
        const ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
      h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
      h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(36);
    }

    function generateNonce() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let s = "";
      for (let i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
      return s;
    }

    function encodeCreditTag(credits) {
      return credits.toString(36).toUpperCase().padStart(2, "0");
    }

    function decodeCreditTag(tag) {
      return parseInt(tag, 36);
    }

    function generateCDK(credits) {
      const nonce = generateNonce();
      const tag = encodeCreditTag(credits);
      const payload = `${CDK_SECRET}:${nonce}:${tag}`;
      const hash = simpleHash(payload).toUpperCase().slice(0, 5);
      return `PD-${nonce}-${hash}-${tag}`;
    }

    function validateCDK(code) {
      code = code.trim().toUpperCase();
      const m = code.match(/^PD-([A-Z0-9]{5})-([A-Z0-9]{3,8})-([A-Z0-9]{2})$/);
      if (!m) return null;
      const [, nonce, hash, tag] = m;
      const payload = `${CDK_SECRET}:${nonce}:${tag}`;
      const expected = simpleHash(payload).toUpperCase().slice(0, 5);
      if (hash !== expected) return null;
      const credits = decodeCreditTag(tag);
      if (!credits || credits < 1 || credits > 9999) return null;
      return { code, credits };
    }

    function getCredits() {
      return parseInt(localStorage.getItem("pindou_credits") || "0", 10);
    }

    function setCredits(n) {
      localStorage.setItem("pindou_credits", String(Math.max(0, n)));
      $("creditsNum").textContent = Math.max(0, n);
    }

    function spendCredits(amount) {
      const cur = getCredits();
      if (cur < amount) return false;
      setCredits(cur - amount);
      return true;
    }

    function getUsedCdks() {
      try { return JSON.parse(localStorage.getItem("pindou_used_cdks") || "[]"); }
      catch { return []; }
    }

    function markCdkUsed(code) {
      const used = getUsedCdks();
      used.push(code);
      localStorage.setItem("pindou_used_cdks", JSON.stringify(used));
    }

    function isCdkUsed(code) {
      return getUsedCdks().includes(code);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    // ========== CDK Modal ==========
